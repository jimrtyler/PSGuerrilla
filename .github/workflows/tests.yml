name: golden-fixture tests

# Detection-logic gate: runs the cross-platform golden-fixture suite on every push
# to main and every PR. Intentionally scoped to Tests/Invoke-FixtureTests.ps1 (the
# golden-fixture verdict suite) — NOT the full Tests/Unit, which contains Windows-only
# tests (Task Scheduler / Event Log) that would false-red on Linux runners.
#
# The runner exits non-zero if any fixture's actual Status != expected, so a red run
# blocks the merge. Enable branch protection on `main` requiring this check, and cut
# releases only from a green commit (the release SHA should show a passing run here).

on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'Tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  golden-fixtures:
    name: Golden-fixture detection suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run golden-fixture detection tests
        shell: pwsh
        run: |
          Write-Host "PowerShell $($PSVersionTable.PSVersion)"
          ./Tests/Invoke-FixtureTests.ps1 -EmitSummary Tests/test-summary.json
          # Invoke-FixtureTests.ps1 exits 1 if any check's verdict != expected,
          # which fails the job and blocks the merge. On green it writes
          # test-summary.json: the derived source of every count the website shows
          # (checks, fixtures, pass/fail, per-check verdicts, version, SHA).

      - name: Reconcile public numbers against the derived artifact
        shell: pwsh
        run: |
          # Gate E: every count advertised in the manifest Description and README
          # must equal what the fixture run just derived. Stale prose fails the build.
          ./Tests/Invoke-CountReconciliation.ps1 -SummaryPath Tests/test-summary.json

      - name: Upload test-summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: Tests/test-summary.json
          if-no-files-found: error

      - name: Full unit suite (schema, contracts, everything under Tests/Unit)
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck -ErrorAction SilentlyContinue
          $r = Invoke-Pester -Path 'Tests/Unit' -Output Normal -PassThru
          # The whole suite gates: ZT schema, provenance, collector contracts, and every
          # other unit test. A red suite anyone routes around stops meaning anything.
          # Windows-only surfaces (scheduled tasks, event log, APPDATA migration) self-skip
          # off Windows and are reported as skipped, never silently green.
          "unit: $($r.PassedCount) passed, $($r.FailedCount) failed, $($r.SkippedCount) skipped"
          if ($r.FailedCount -gt 0) { exit 1 }

      - name: Gate poison self-tests (each gate must prove it can fail)
        shell: pwsh
        run: |
          # Injected failures must exit non-zero through the same invocation shapes
          # the gates use. A gate that cannot demonstrate red proves nothing when green.
          ./Tests/Invoke-GatePoisonSelfTests.ps1
