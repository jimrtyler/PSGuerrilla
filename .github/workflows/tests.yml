name: golden-fixture tests

# Detection-logic gate: runs the cross-platform golden-fixture suite on every push
# to main and every PR. Intentionally scoped to Tests/Invoke-FixtureTests.ps1 (the
# golden-fixture verdict suite) — NOT the full Tests/Unit, which contains Windows-only
# tests (Task Scheduler / Event Log) that would false-red on Linux runners.
#
# The runner exits non-zero if any fixture's actual Status != expected, so a red run
# blocks the merge. Enable branch protection on `main` requiring this check, and cut
# releases only from a green commit (the release SHA should show a passing run here).

on:
  push:
    branches: [main]
    paths:
      - 'source/**'
      - 'Tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  golden-fixtures:
    name: Golden-fixture detection suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run golden-fixture detection tests
        shell: pwsh
        run: |
          Write-Host "PowerShell $($PSVersionTable.PSVersion)"
          ./Tests/Invoke-FixtureTests.ps1 -EmitSummary Tests/test-summary.json
          # Invoke-FixtureTests.ps1 exits 1 if any check's verdict != expected,
          # which fails the job and blocks the merge. On green it writes
          # test-summary.json: the derived source of every count the website shows
          # (checks, fixtures, pass/fail, per-check verdicts, version, SHA).

      - name: Upload test-summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-summary
          path: Tests/test-summary.json
          if-no-files-found: error

      - name: Schema + collector-contract tests
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck -ErrorAction SilentlyContinue
          $r = Invoke-Pester -Path @(
            'Tests/Unit/ZeroTrustSchema.Tests.ps1',
            'Tests/Unit/ProvenanceSchema.Tests.ps1',
            'Tests/Unit/Private/Entra/CollectorQueryContract.Tests.ps1'
          ) -Output Detailed -PassThru
          # Every check must declare a ZT pillar + weight (schema), and collectors must
          # request the exact Graph endpoints/params (contract). Either failing = red.
          if ($r.FailedCount -gt 0) { exit 1 }
